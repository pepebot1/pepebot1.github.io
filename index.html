<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>
html,body{
margin:0;
width:100%;
height:100%;
background:#000;
overflow:hidden;
}

#lottie{
width:100vw;
height:100vh;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
</head>

<body>

<div id="lottie"></div>

<script>

// Get id from URL, default to "1" instead of "0"
const params = new URLSearchParams(window.location.search);
const id = params.get("id") || "1";


// *****************json****************************
const CID = "bafybeid6f4u7sxw36xk663sr4zy3qzpjlflwazwtm4fhh4jjfitounnhw4";


// JSON Link will be generated
const jsonURL = `https://ipfs.io/ipfs/${CID}/${id}.lottie.json`;

lottie.loadAnimation({

container:document.getElementById("lottie"),

renderer:"svg",

loop:true,

autoplay:true,

path:jsonURL

});

</script>

</body>
</html>
