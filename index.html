<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFT Layer Studio</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=Outfit:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; }
    .mono { font-family: 'Space Mono', monospace; }
    .nft-card { background: linear-gradient(145deg, #1a1a2e, #16213e); border: 1px solid #2a2a4a; }
    .layer-card { background: #1a1a2e; border: 1px solid #2a2a4a; }
    .glow { box-shadow: 0 0 20px rgba(99, 102, 241, 0.15); }
    .tab-active { background: #6366f1; color: white; }
    .tab-inactive { background: #1a1a2e; color: #94a3b8; }
    input[type="file"]::file-selector-button {
      background: #6366f1; color: white; border: none; padding: 8px 16px;
      border-radius: 8px; cursor: pointer; font-family: 'Outfit', sans-serif;
    }
    .layer-preview img { image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease; }
  </style>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full bg-[#0f0f1a] text-[#e2e8f0] overflow-auto">
  <div id="app" class="w-full h-full flex flex-col"><!-- Header -->
   <header class="p-4 border-b border-[#2a2a4a] flex items-center justify-between">
    <h1 id="app-title" class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">NFT Layer Studio</h1><span class="mono text-xs text-slate-500">v1.0</span>
   </header><!-- Tabs -->
   <div class="flex p-3 gap-2"><button onclick="switchTab('layers')" id="tab-layers" class="tab-active px-4 py-2 rounded-lg text-sm font-medium transition-all">Layers</button> <button onclick="switchTab('create')" id="tab-create" class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition-all">Create NFT</button> <button onclick="switchTab('collection')" id="tab-collection" class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition-all">Collection</button>
   </div><!-- Content -->
   <div class="flex-1 overflow-auto p-4"><!-- Layers Tab -->
    <div id="panel-layers" class="space-y-4">
     <div class="flex items-center gap-3"><label class="flex-1 relative"> <input type="file" id="layer-upload" accept="image/*" multiple class="w-full text-sm text-slate-400 file:mr-3"> </label>
     </div><input type="text" id="layer-name" placeholder="Layer name (optional)" class="w-full bg-[#1a1a2e] border border-[#2a2a4a] rounded-lg px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500"> <button onclick="addLayer()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg py-3 font-medium transition-all flex items-center justify-center gap-2"> <i data-lucide="plus" style="width:18px;height:18px"></i> Add Layer </button>
     <div id="layers-list" class="grid grid-cols-2 gap-3 mt-4"></div>
     <p id="layers-empty" class="text-center text-slate-500 text-sm py-8">No layers yet. Upload images to get started.</p>
    </div><!-- Create Tab -->
    <div id="panel-create" class="space-y-4 hidden">
     <p class="text-sm text-slate-400 mb-2">Select layers to combine into an NFT:</p>
     <div id="create-layers-list" class="grid grid-cols-3 gap-3"></div><input type="text" id="nft-name" placeholder="NFT Name" class="w-full bg-[#1a1a2e] border border-[#2a2a4a] rounded-lg px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500"> <button onclick="createNFT()" id="btn-create-nft" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white rounded-lg py-3 font-medium transition-all"> Generate NFT </button>
     <div id="create-preview" class="hidden mt-4"></div>
    </div><!-- Collection Tab -->
    <div id="panel-collection" class="space-y-4 hidden">
     <div id="nft-count" class="text-sm text-slate-400"></div>
     <div id="nft-list" class="grid grid-cols-1 gap-4"></div>
     <p id="nft-empty" class="text-center text-slate-500 text-sm py-8">No NFTs created yet.</p>
    </div>
   </div><!-- Toast -->
   <div id="toast" class="fixed bottom-4 left-4 right-4 bg-indigo-600 text-white px-4 py-3 rounded-lg text-sm text-center hidden transition-all z-50"></div>
  </div>
  <script>
    // State
    let layers = []; // { id, name, dataUrl }
    let selectedLayers = new Set();
    let nfts = []; // from Data SDK
    let currentTab = 'layers';

    const defaultConfig = {
      app_title: 'NFT Layer Studio',
      primary_color: '#6366f1',
      background_color: '#0f0f1a',
      surface_color: '#1a1a2e',
      text_color: '#e2e8f0',
      accent_color: '#a78bfa'
    };

    // Element SDK
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const title = config.app_title || defaultConfig.app_title;
        document.getElementById('app-title').textContent = title;
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); document.body.style.backgroundColor = v; } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); document.body.style.color = v; } },
          { get: () => config.primary_color || defaultConfig.primary_color, set: (v) => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
          { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || 'Outfit',
          set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); document.body.style.fontFamily = `${v}, sans-serif`; }
        },
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (config) => new Map([
        ["app_title", config.app_title || defaultConfig.app_title]
      ])
    });

    // Data SDK
    const dataHandler = {
      onDataChanged(data) {
        nfts = data;
        renderCollection();
      }
    };

    (async () => {
      const r = await window.dataSdk.init(dataHandler);
      if (!r.isOk) console.error('Data SDK init failed');
    })();

    // Tab switching
    function switchTab(tab) {
      currentTab = tab;
      ['layers', 'create', 'collection'].forEach(t => {
        document.getElementById(`panel-${t}`).classList.toggle('hidden', t !== tab);
        document.getElementById(`tab-${t}`).className = t === tab ? 'tab-active px-4 py-2 rounded-lg text-sm font-medium transition-all' : 'tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition-all';
      });
      if (tab === 'create') renderCreateLayers();
    }

    // Layers
    function addLayer() {
      const input = document.getElementById('layer-upload');
      const nameInput = document.getElementById('layer-name');
      if (!input.files || !input.files.length) { showToast('Please select an image'); return; }

      Array.from(input.files).forEach((file, i) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const name = nameInput.value.trim() || file.name.replace(/\.[^.]+$/, '') || `Layer ${layers.length + 1}`;
          layers.push({ id: Date.now() + '_' + i, name: layers.length > 0 && !nameInput.value.trim() ? name : name, dataUrl: e.target.result });
          renderLayers();
        };
        reader.readAsDataURL(file);
      });
      input.value = '';
      nameInput.value = '';
    }

    function deleteLayer(id) {
      layers = layers.filter(l => l.id !== id);
      selectedLayers.delete(id);
      renderLayers();
    }

    function editLayerName(id) {
      const layer = layers.find(l => l.id === id);
      if (!layer) return;
      const card = document.querySelector(`[data-layer-id="${id}"]`);
      const nameEl = card.querySelector('.layer-name');
      const input = document.createElement('input');
      input.type = 'text';
      input.value = layer.name;
      input.className = 'bg-[#0f0f1a] border border-indigo-500 rounded px-2 py-1 text-xs text-white w-full focus:outline-none';
      input.onblur = () => { layer.name = input.value || layer.name; renderLayers(); };
      input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); };
      nameEl.replaceWith(input);
      input.focus();
    }

    function renderLayers() {
      const list = document.getElementById('layers-list');
      const empty = document.getElementById('layers-empty');
      empty.classList.toggle('hidden', layers.length > 0);
      list.innerHTML = layers.map(l => `
        <div class="layer-card rounded-xl p-3 fade-in" data-layer-id="${l.id}">
          <div class="layer-preview aspect-square rounded-lg overflow-hidden bg-[#0f0f1a] mb-2 flex items-center justify-center">
            <img src="${l.dataUrl}" alt="${l.name}" class="w-full h-full object-contain" style="image-rendering:crisp-edges;">
          </div>
          <p class="layer-name text-xs font-medium truncate mb-2">${l.name}</p>
          <div class="flex gap-1">
            <button onclick="editLayerName('${l.id}')" class="flex-1 text-xs bg-[#2a2a4a] hover:bg-[#3a3a5a] rounded py-1 transition-all">Edit</button>
            <button onclick="deleteLayer('${l.id}')" class="flex-1 text-xs bg-red-900/40 hover:bg-red-900/70 text-red-300 rounded py-1 transition-all">Delete</button>
          </div>
        </div>
      `).join('');
    }

    // Create NFT
    function renderCreateLayers() {
      const list = document.getElementById('create-layers-list');
      if (!layers.length) { list.innerHTML = '<p class="col-span-3 text-center text-slate-500 text-sm py-4">Add layers first</p>'; return; }
      list.innerHTML = layers.map(l => `
        <div onclick="toggleSelect('${l.id}')" class="cursor-pointer rounded-lg overflow-hidden border-2 transition-all ${selectedLayers.has(l.id) ? 'border-indigo-500 glow' : 'border-[#2a2a4a]'}">
          <div class="aspect-square bg-[#0f0f1a] flex items-center justify-center">
            <img src="${l.dataUrl}" alt="${l.name}" class="w-full h-full object-contain" style="image-rendering:crisp-edges;">
          </div>
          <p class="text-[10px] text-center py-1 truncate px-1">${l.name}</p>
        </div>
      `).join('');
    }

    function toggleSelect(id) {
      if (selectedLayers.has(id)) selectedLayers.delete(id); else selectedLayers.add(id);
      renderCreateLayers();
    }

    async function createNFT() {
      if (!selectedLayers.size) { showToast('Select at least one layer'); return; }
      const name = document.getElementById('nft-name').value.trim() || `NFT #${nfts.length + 1}`;
      if (nfts.length >= 999) { showToast('Maximum 999 NFTs reached'); return; }

      const btn = document.getElementById('btn-create-nft');
      btn.disabled = true; btn.textContent = 'Generating...';

      try {
        // Composite layers onto canvas
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'rgba(0,0,0,0)';
        ctx.fillRect(0, 0, 512, 512);

        const selectedArr = layers.filter(l => selectedLayers.has(l.id));
        
        for (const layer of selectedArr) {
          await new Promise((res, rej) => {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => { 
              try {
                ctx.drawImage(img, 0, 0, 512, 512); 
                res(); 
              } catch(e) { rej(e); }
            };
            img.onerror = () => rej(new Error('Image load failed'));
            img.src = layer.dataUrl;
          });
        }

        const thumbnail = canvas.toDataURL('image/png');
        const layerNames = selectedArr.map(l => l.name).join('|');

        const result = await window.dataSdk.create({
          name,
          layers: layerNames,
          created_at: new Date().toISOString()
        });

        btn.disabled = false; 
        btn.textContent = 'Generate NFT';

        if (result.isOk) {
          showToast(`"${name}" created successfully!`);
          document.getElementById('nft-name').value = '';
          selectedLayers.clear();
          renderCreateLayers();
          switchTab('collection');
        } else {
          showToast('Error: ' + (result.error?.message || 'Failed to create NFT'));
        }
      } catch(err) {
        btn.disabled = false; 
        btn.textContent = 'Generate NFT';
        showToast('Error: ' + err.message);
      }
    }

    // Collection
    function renderCollection() {
      const list = document.getElementById('nft-list');
      const empty = document.getElementById('nft-empty');
      const count = document.getElementById('nft-count');
      empty.classList.toggle('hidden', nfts.length > 0);
      count.textContent = nfts.length ? `${nfts.length} NFT${nfts.length > 1 ? 's' : ''} in collection` : '';

      list.innerHTML = nfts.map(nft => `
        <div class="nft-card rounded-2xl p-4 glow fade-in">
          <div class="aspect-square rounded-xl overflow-hidden bg-[#0f0f1a] mb-3">
            <img src="${nft.thumbnail || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22512%22 height=%22512%22%3E%3Crect fill=%22%231a1a2e%22 width=%22512%22 height=%22512%22/%3E%3C/svg%3E'}" alt="${nft.name}" class="w-full h-full object-contain" style="image-rendering:crisp-edges;">
          </div>
          <h3 class="font-semibold text-base mb-1">${nft.name}</h3>
          <p class="text-xs text-slate-400 mb-3 mono">${(nft.layers || '').split('|').join(' + ')}</p>
          <div class="flex gap-2">
            <button onclick="downloadJSON('${nft.__backendId}')" class="flex-1 bg-[#2a2a4a] hover:bg-[#3a3a5a] rounded-lg py-2 text-xs font-medium transition-all flex items-center justify-center gap-1">
              <i data-lucide="download" style="width:14px;height:14px"></i> JSON
            </button>
            <button onclick="deleteNFT('${nft.__backendId}')" class="flex-1 bg-red-900/30 hover:bg-red-900/60 text-red-300 rounded-lg py-2 text-xs font-medium transition-all flex items-center justify-center gap-1">
              <i data-lucide="trash-2" style="width:14px;height:14px"></i> Delete
            </button>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function downloadJSON(id) {
      const nft = nfts.find(n => n.__backendId === id);
      if (!nft) { showToast('NFT not found'); return; }
      
      try {
        const metadata = {
          name: nft.name,
          description: `NFT generated with layers: ${(nft.layers || '').split('|').join(', ')}`,
          attributes: (nft.layers || '').split('|').map((l, i) => ({ trait_type: `Layer ${i + 1}`, value: l })),
          image: nft.thumbnail,
          created_at: nft.created_at
        };
        
        const jsonString = JSON.stringify(metadata, null, 2);
        const blob = new Blob([jsonString], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${(nft.name || 'nft').replace(/\s+/g, '_').toLowerCase()}.json`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        showToast('JSON downloaded successfully!');
      } catch(err) {
        showToast('Error downloading JSON: ' + err.message);
      }
    }

    async function deleteNFT(id) {
      const nft = nfts.find(n => n.__backendId === id);
      if (!nft) return;
      const card = document.querySelector(`[data-nft-id="${id}"]`);
      const result = await window.dataSdk.delete(nft);
      if (!result.isOk) showToast('Error deleting NFT');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.remove('hidden');
      setTimeout(() => t.classList.add('hidden'), 2500);
    }

    lucide.createIcons();
  </script>

</html>
